name: Appwrite CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: read

concurrency:
  group: appwrite-cicd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run test suite
        run: python -m pytest -q

  docker_publish:
    name: Build And Push Docker Image
    runs-on: ubuntu-latest
    needs:
      - test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ajaysin/telegram-copier
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy Appwrite Functions
    runs-on: ubuntu-latest
    needs:
      - test
      - docker_publish
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment:
      name: production

    env:
      APPWRITE_ENDPOINT: ${{ secrets.APPWRITE_ENDPOINT }}
      APPWRITE_PROJECT_ID: ${{ secrets.APPWRITE_PROJECT_ID }}
      APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}


    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Appwrite CLI
        run: npm install -g appwrite-cli

      - name: Verify Secrets
        run: |
          set -euo pipefail
          if [ -z "$APPWRITE_ENDPOINT" ] || [ -z "$APPWRITE_PROJECT_ID" ] || [ -z "$APPWRITE_API_KEY" ]; then
            echo "Missing required secrets."
            exit 1
          fi
          echo "Secrets loaded successfully."        

      - name: Configure Appwrite CLI

        run: |

          appwrite client --endpoint "$APPWRITE_ENDPOINT"
          appwrite client --project-id "$APPWRITE_PROJECT_ID"
          appwrite client --key "$APPWRITE_API_KEY"


      - name: Validate Appwrite Authentication
        run: |
          set -euo pipefail
          appwrite functions list >/dev/null
          echo "Appwrite authentication successful."

      - name: Deploy functions
        working-directory: telegram_copier
        run: |
          set -euo pipefail
          OUT_FILE="$(mktemp)"

          appwrite push functions --all --force 2>&1 | tee "$OUT_FILE" || true

          if grep -Eq "(✗ Error|No functions were pushed|missing scopes|role: guests)" "$OUT_FILE"; then
            echo "Appwrite deploy failed. See logs above."
            exit 1
          fi

          echo "Deployment successful."
