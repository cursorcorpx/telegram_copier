name: Appwrite CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run test suite
        run: python -m pytest -q

  deploy:
    name: Deploy Appwrite Functions
    runs-on: ubuntu-latest
    needs:
      - test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Appwrite CLI
        run: npm install -g appwrite-cli

      - name: Configure Appwrite CLI
        env:
          APPWRITE_ENDPOINT: ${{ secrets.APPWRITE_ENDPOINT }}
          APPWRITE_PROJECT_ID: ${{ secrets.APPWRITE_PROJECT_ID }}
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "$APPWRITE_ENDPOINT" ] || [ -z "$APPWRITE_PROJECT_ID" ] || [ -z "$APPWRITE_API_KEY" ]; then
            echo "Missing one or more required secrets: APPWRITE_ENDPOINT, APPWRITE_PROJECT_ID, APPWRITE_API_KEY"
            exit 1
          fi

          appwrite client --endpoint "$APPWRITE_ENDPOINT" --project-id "$APPWRITE_PROJECT_ID" --key "$APPWRITE_API_KEY" \
            || appwrite client --endpoint "$APPWRITE_ENDPOINT" --projectId "$APPWRITE_PROJECT_ID" --key "$APPWRITE_API_KEY"
            
      - name: Debug Appwrite Auth
        run: appwrite account get

      - name: Validate Appwrite auth/scopes
        run: |
          set -euo pipefail
          appwrite projects list >/dev/null

      - name: Deploy functions
        run: |
          set -euo pipefail
          OUT_FILE="$(mktemp)"
          appwrite push functions --all --force 2>&1 | tee "$OUT_FILE" || true

          if grep -Eq "(✗ Error|No functions were pushed|missing scopes|role: guests)" "$OUT_FILE"; then
            echo "Appwrite deploy failed. See logs above."
            exit 1
          fi
